server.port=${PORT:8080}

spring.application.name=reactive-api
spring.r2dbc.url=${DATABASE_URL:r2dbc:postgresql://localhost:5432/reactivedb}
spring.r2dbc.username=${DATABASE_USER:postgres}
spring.r2dbc.password=${DATABASE_PASSWORD:postgres}
spring.sql.init.mode=always
spring.sql.init.schema-locations=classpath:schema.sql

jwt.secret=${JWT_SECRET:MiClaveSecretaSuperSegura1234567890ABCDEFGHIJKLMNOPQRSTUVWXYZabcdef}
jwt.expiration=86400000